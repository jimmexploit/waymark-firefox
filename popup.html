<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <link rel="stylesheet" href="fonts/fonts.css"/>
  <style>    :root,[data-theme="dark"]{
      --bg:#111116;--surface:#18181f;--surface2:#22222b;--surface3:#2a2a35;
      --border:#2e2e3a;--text:#ede9e3;--text2:#b8b4ae;
      --muted:#72707a;--accent:#e8612a;--blue:#3b82f6;
      --shadow:rgba(0,0,0,0.5);
    }
    [data-theme="light"]{
      --bg:#f5f3ef;--surface:#ffffff;--surface2:#eceae5;--surface3:#e4e1db;
      --border:#d4d0c8;--text:#1a1812;--text2:#4a4640;
      --muted:#8a8680;--accent:#d4531f;--blue:#2563eb;
      --shadow:rgba(0,0,0,0.08);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      width:360px;background:var(--bg);color:var(--text);
      font-family:'Inter',system-ui,sans-serif;font-size:13px;
      -webkit-font-smoothing:antialiased;
    }

    /* ── HEADER: Waymark · vercel link ── */
    header{
      padding:11px 14px 10px;
      background:var(--surface);border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:6px;
    }
    .logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;box-shadow:0 0 6px var(--accent);flex-shrink:0;}
    .logo-text{font-weight:700;font-size:15px;letter-spacing:-0.3px;color:var(--text);}
    .logo-link{
      font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);
      text-decoration:none;padding-top:1px;transition:color 0.15s;cursor:pointer;
    }
    .logo-link:hover{color:var(--text2);}
    .h-sep{flex:1;}

    /* ── TABS ── */
    .tabs{display:grid;grid-template-columns:1fr 1fr 1fr;background:var(--surface);border-bottom:1px solid var(--border);}
    .tab{
      padding:8px 0;background:none;border:none;border-bottom:2px solid transparent;
      color:var(--muted);font-family:'Inter',sans-serif;font-size:11px;font-weight:600;
      letter-spacing:0.4px;text-transform:uppercase;cursor:pointer;transition:all 0.15s;text-align:center;
    }
    .tab.active{color:var(--accent);border-bottom-color:var(--accent);}
    .tab:hover:not(.active){color:var(--text);}

    .panel{display:none;} .panel.active{display:block;}

    /* ── PAGE HOST STRIP ── */
    .host-strip{
      padding:4px 12px;background:var(--bg);
      display:flex;align-items:center;gap:6px;
      border-bottom:1px solid var(--border);
    }
    .host-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .btn-plus-domain{
      background:none;border:none;font-size:10px;font-weight:600;
      color:var(--blue);cursor:pointer;padding:2px 5px;border-radius:3px;white-space:nowrap;
      transition:background 0.12s;flex-shrink:0;
    }
    .btn-plus-domain:hover{background:color-mix(in srgb,var(--blue) 12%,transparent);}

    /* ── SPOTS ── */
    .list-head{padding:7px 12px 4px;display:flex;align-items:center;justify-content:space-between;}
    .list-title{font-size:10px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--muted);}
    .head-right{display:flex;align-items:center;gap:5px;}
    .badge{background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent);font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:1px 7px;border-radius:9px;}
    .btn-clear{background:none;border:none;color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;padding:2px 6px;border-radius:3px;transition:all 0.12s;}
    .btn-clear:hover{color:#e05555;background:rgba(224,85,85,0.1);}

    .prog-wrap{height:2px;background:var(--surface2);overflow:hidden;display:none;}
    .prog-wrap.on{display:block;}
    .prog-bar{height:100%;background:var(--accent);width:0%;transition:width 0.08s;}

    .spots-list{max-height:272px;overflow-y:auto;padding:0 10px 8px;}
    .spots-list::-webkit-scrollbar{width:2px;}
    .spots-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:1px;}

    .empty{padding:28px 0;text-align:center;color:var(--muted);font-size:12px;line-height:1.9;}
    .empty b{color:var(--text2);}

    .spot-card{
      background:var(--surface);border:1px solid var(--border);
      border-left:3px solid;border-radius:0 7px 7px 0;
      padding:8px 10px;margin-bottom:4px;cursor:pointer;
      transition:all 0.1s;position:relative;
    }
    .spot-card:hover{background:var(--surface2);transform:translateX(2px);}
    .spot-sec{font-size:9px;font-weight:700;letter-spacing:0.7px;text-transform:uppercase;color:var(--muted);margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:22px;}
    .spot-snip{font-size:12px;font-weight:500;color:var(--text);line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;padding-right:22px;}
    .spot-title-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:2px;padding-right:22px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .spot-meta{margin-top:3px;display:flex;align-items:center;gap:5px;}
    .spot-time{font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
    .spot-badge{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;text-transform:uppercase;}
    .spot-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
    .spot-del{position:absolute;top:8px;right:7px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;padding:2px 4px;border-radius:2px;transition:all 0.1s;}
    .spot-del:hover{color:#e05555;background:rgba(224,85,85,0.1);}

    /* ── SEARCH ── */
    .search-wrap{padding:9px 10px 5px;}
    .search-inp{width:100%;padding:7px 11px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;outline:none;transition:border-color 0.15s;}
    .search-inp:focus{border-color:var(--accent);}
    .search-inp::placeholder{color:var(--muted);}
    .search-res{max-height:310px;overflow-y:auto;padding:0 10px 8px;}
    .search-res::-webkit-scrollbar{width:2px;}
    .search-empty{padding:24px 0;text-align:center;color:var(--muted);font-size:12px;font-weight:500;}
    .search-grp{font-size:9px;font-weight:700;letter-spacing:0.9px;text-transform:uppercase;color:var(--muted);padding:7px 0 3px;border-bottom:1px solid var(--border);margin-bottom:4px;}
    .search-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid;border-radius:0 6px 6px 0;padding:7px 9px;margin-bottom:4px;cursor:pointer;transition:all 0.1s;}
    .search-card:hover{background:var(--surface2);transform:translateX(2px);}
    .search-card-title{font-size:12px;font-weight:500;color:var(--text);margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .search-card-url{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .search-card-meta{display:flex;align-items:center;justify-content:space-between;margin-top:3px;gap:8px;}
    .search-card-loc{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
    .search-card-mode{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;flex-shrink:0;}
    mark{background:color-mix(in srgb,var(--accent) 20%,transparent);color:var(--accent);border-radius:2px;padding:0 1px;}

    /* ── BACKUP ── */
    .sec-pad{padding:12px;display:flex;flex-direction:column;gap:9px;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;}
    .card-title{font-size:9px;font-weight:700;letter-spacing:0.9px;text-transform:uppercase;color:var(--muted);margin-bottom:9px;}
    .stat-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
    .stat-row:last-child{margin-bottom:0;}
    .stat-label{font-size:12px;font-weight:600;color:var(--text2);}
    .stat-val{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text);}
    .btn-row{display:flex;gap:7px;}
    .btn{flex:1;padding:9px 0;border-radius:7px;border:none;font-family:'Inter',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.13s;display:flex;align-items:center;justify-content:center;gap:4px;}
    .btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
    .btn-ghost:hover{background:var(--surface3);}
    .btn-acc{background:var(--accent);color:white;}
    .btn-acc:hover{opacity:0.88;}
    .btn-danger{background:transparent;color:#e05555;border:1px solid color-mix(in srgb,#e05555 30%,transparent);}
    .btn-danger:hover{background:rgba(224,85,85,0.1);}
    .note{font-size:10px;font-weight:500;color:var(--muted);line-height:1.6;text-align:center;}
    .note b{color:var(--text2);}

    /* ── FOOTER ── */
    .footer-bar{
      padding:8px 14px;border-top:1px solid var(--border);background:var(--surface);
      display:flex;align-items:center;gap:8px;
    }
    /* Legend indicators — not buttons, just colored reference icons */
    .ftr-legend{display:flex;align-items:center;gap:5px;cursor:default;}
    .ftr-legend-icon{
      width:28px;height:28px;border-radius:6px;display:flex;align-items:center;
      justify-content:center;flex-shrink:0;
    }
    .ftr-legend-label{font-size:10px;font-weight:600;color:var(--muted);white-space:nowrap;}
    .ftr-sep{flex:1;}
    /* simple pill toggle */
    .theme-toggle{
      background:var(--surface2);border:1px solid var(--border);
      border-radius:20px;width:44px;height:24px;cursor:pointer;position:relative;
      transition:background 0.2s,border-color 0.2s;flex-shrink:0;
    }
    .theme-knob{
      position:absolute;top:3px;
      width:16px;height:16px;border-radius:50%;
      transition:left 0.2s,background 0.2s,box-shadow 0.2s;
    }
    [data-theme="dark"]  .theme-knob{left:3px;background:var(--accent);box-shadow:0 0 6px var(--accent);}
    [data-theme="light"] .theme-knob{left:23px;background:#888;box-shadow:none;}
    /* settings icon button */
    .ftr-settings{
      background:none;border:none;cursor:pointer;
      width:28px;height:28px;display:flex;align-items:center;justify-content:center;
      color:var(--muted);border-radius:5px;transition:color 0.13s,background 0.13s;
    }
    .ftr-settings:hover{color:var(--text);background:var(--surface2);}

    /* ── TOAST ── */
    .wm-toast{
      position:fixed;bottom:40px;left:50%;transform:translateX(-50%);
      background:var(--surface2);border:1px solid var(--border);color:var(--text2);
      font-family:'Inter',sans-serif;font-size:11px;font-weight:600;
      padding:5px 14px;border-radius:16px;z-index:9999;white-space:nowrap;
      box-shadow:0 2px 10px var(--shadow);animation:wm-fade 0.15s ease;
    }
    @keyframes wm-fade{from{opacity:0;transform:translateX(-50%) translateY(4px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

    /* ── DIALOG ── */
    .wm-ov{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px);}
    .wm-dlg{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:18px 18px 14px;width:248px;box-shadow:0 8px 30px var(--shadow);}
    .wm-dlg-icon{font-size:24px;text-align:center;margin-bottom:7px;}
    .wm-dlg-title{font-weight:700;font-size:14px;text-align:center;margin-bottom:4px;}
    .wm-dlg-msg{font-size:11px;font-weight:500;color:var(--muted);text-align:center;line-height:1.5;margin-bottom:14px;}
    .wm-dlg-btns{display:flex;gap:7px;}
    .wm-dlg-btns button{flex:1;padding:8px 0;border-radius:7px;border:none;font-family:'Inter',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.13s;}
    .wm-btn-cancel{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
    .wm-btn-cancel:hover{background:var(--surface3);}
    .wm-btn-ok{background:#e05555;color:white;}
    .wm-btn-ok:hover{background:#c44040;}

    #file-input{display:none;}
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <span class="logo-dot"></span>
  <span class="logo-text">Waymark</span>
  <div class="h-sep"></div>
  <a class="logo-link" id="header-link" href="#">jimmexploit.vercel.app</a>
</header>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" id="tab-btn-spots">Spots</button>
  <button class="tab" id="tab-btn-search">Search</button>
  <button class="tab" id="tab-btn-backup">Backup</button>
</div>

<!-- SPOTS PANEL -->
<div class="panel active" id="tab-spots">
  <div class="host-strip">
    <span class="host-label" id="page-host">—</span>
    <button class="btn-plus-domain" id="btn-add-domain">+ Domain</button>
  </div>
  <div class="list-head">
    <span class="list-title">This page</span>
    <div class="head-right">
      <span class="badge" id="count">0</span>
      <button class="btn-clear" id="btn-clear">Clear</button>
    </div>
  </div>
  <div class="prog-wrap" id="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
  <div class="spots-list" id="spots-list"></div>
</div>

<!-- SEARCH PANEL -->
<div class="panel" id="tab-search">
  <div class="search-wrap">
    <input class="search-inp" id="search-input" placeholder="Search all marks…" autocomplete="off"/>
  </div>
  <div class="search-res" id="search-results">
    <div class="search-empty">Start typing to search across all your saved marks.</div>
  </div>
</div>

<!-- BACKUP PANEL -->
<div class="panel" id="tab-backup">
  <div class="sec-pad">
    <div class="card">
      <div class="card-title">Storage</div>
      <div class="stat-row"><span class="stat-label">Saved marks</span><span class="stat-val" id="stat-total">0</span></div>
      <div class="stat-row"><span class="stat-label">Pages tracked</span><span class="stat-val" id="stat-pages">0</span></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-acc" id="btn-export">↓ Export</button>
    </div>
    <button class="btn btn-danger" id="btn-wipe">Delete all saved marks</button>
    <div class="note">Marks save <b>automatically</b>. Export includes settings.</div>
  </div>
</div>

<!-- FOOTER -->
<div class="footer-bar">
  <!-- one-time legend -->
  <div class="ftr-legend" title="One-time mark — disappears on reload">
    <div class="ftr-legend-icon" id="legend-onetime">
      <svg width="11" height="14" viewBox="0 0 14 18"><path d="M1 1H13V17L7 13L1 17Z" fill="currentColor"/></svg>
    </div>
    <span class="ftr-legend-label">One-time</span>
  </div>
  <!-- saved legend -->
  <div class="ftr-legend" title="Saved mark — persists across visits">
    <div class="ftr-legend-icon" id="legend-saved">
      <svg width="11" height="14" viewBox="0 0 14 18"><path d="M1 1H13V17L7 13L1 17Z" fill="none" stroke="currentColor" stroke-width="2"/></svg>
    </div>
    <span class="ftr-legend-label">Saved</span>
  </div>
  <div class="ftr-sep"></div>
  <!-- theme pill toggle -->
  <button class="theme-toggle" id="btn-theme" title="Toggle theme" aria-label="Toggle theme">
    <div class="theme-knob"></div>
  </button>
  <!-- settings icon -->
  <button class="ftr-settings" id="btn-settings" title="Settings">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>
</div>

<input type="file" id="file-input" accept=".json"/>
<script src="popup.js"></script>
</body>
</html>
